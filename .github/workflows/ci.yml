name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  make-all:
    name: make all
    if: ${{ github.event.pull_request.head.repo.full_name != github.repository || !startsWith(github.head_ref, 'symphony/') }}
    runs-on: ubuntu-24.04

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: mise und Toolchain aus mise.toml einrichten
        uses: jdx/mise-action@v2
        with:
          version: 2026.3.17

      - name: mise.toml vertrauen
        run: mise trust -y

      - name: Mix-Artefakte cachen
        uses: actions/cache@v4
        with:
          path: |
            deps
            ~/.mix
          key: ci-v1-${{ runner.os }}-${{ hashFiles('mix.lock', 'mise.toml') }}
          restore-keys: |
            ci-v1-${{ runner.os }}-

      - name: make all ausführen
        run: make all
