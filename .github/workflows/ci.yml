name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  make-all:
    name: make all
    runs-on: ubuntu-24.04

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Elixir- und OTP-Versionen aus mise.toml einrichten
        uses: erlef/setup-beam@v1.24.0
        with:
          version-file: mise.toml
          version-type: strict

      - name: Mix-Artefakte cachen
        uses: actions/cache@v4
        with:
          path: |
            deps
            ~/.mix
          key: ci-v1-${{ runner.os }}-${{ hashFiles('mix.lock', 'mise.toml') }}
          restore-keys: |
            ci-v1-${{ runner.os }}-

      - name: make all ausführen
        run: make all
